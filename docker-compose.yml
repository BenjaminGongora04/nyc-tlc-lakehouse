version: '3'

services:
  zookeeper:
    image: ubuntu/zookeeper:latest
    container_name: nyc-tlc-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOO_INIT_LIMIT=5
      - ZOO_SYNC_LIMIT=2

  kafka:
    image: ubuntu/kafka:latest
    container_name: nyc-tlc-lakehouse-main-kafka-1
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
    depends_on:
      - zookeeper

  spark:
    image: apache/spark:latest
    container_name: nyc-tlc-lakehouse-main-spark-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_LOCAL_IP=0.0.0.0

  postgres:
    image: postgres:16
    container_name: nyc-tlc-lakehouse-main-postgres-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nyc_tlc_db
